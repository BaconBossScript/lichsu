<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Lịch Sử 12</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;
  --card:#ffffff;
  --border:#e2e0db;
  --text:#1a1a1a;
  --muted:#6b6866;
  --blue:#1d5fa8;
  --blue-light:#e8f0fb;
  --blue-mid:#b8d0f2;
  --green:#256b3a;
  --green-light:#e6f4ec;
  --red:#b52b2b;
  --red-light:#fce8e8;
  --purple:#4a3ab5;
  --purple-light:#eeedfb;
  --amber:#8a5a00;
  --amber-light:#fdf3dc;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
h2.sr{position:absolute;left:-9999px}

/* LAYOUT */
.container{max-width:720px;margin:0 auto}

/* HEADER */
.header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.title-block h1{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.title-block p{font-size:12px;color:var(--muted)}
.stats{display:flex;gap:16px;align-items:center;flex-shrink:0}
.stat{text-align:center;min-width:40px}
.stat-n{font-size:20px;font-weight:600;line-height:1}
.stat-n.blue{color:var(--blue)}
.stat-n.green{color:var(--green)}
.stat-n.red{color:var(--red)}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-weight:500;transition:all .15s}
.tab:hover{background:var(--bg);border-color:#bbb}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.tab-b13.active{background:#1d5fa8;border-color:#1d5fa8}
.tab-b14.active{background:#4a3ab5;border-color:#4a3ab5}
.tab-b15.active{background:#256b3a;border-color:#256b3a}
.tab-b16.active{background:#8a5a00;border-color:#8a5a00}
.tab-all.active{background:#1a1a1a;border-color:#1a1a1a}

/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:7px;background:#eee;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--blue)}
.prog-label{font-size:12px;color:var(--muted);min-width:50px;text-align:right}

/* QUESTION CARD */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:14px;min-height:260px}
.qcard-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-lvl1{background:var(--blue-light);color:var(--blue)}
.badge-lvl2{background:#fff3e0;color:#b55a00}
.badge-lvl3{background:#f3e8ff;color:#5a2db5}
.badge-lvl4{background:#ffe8e8;color:#b52b2b}
.badge-lesson{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.badge-b13{background:var(--blue-light);color:var(--blue)}
.badge-b14{background:var(--purple-light);color:var(--purple)}
.badge-b15{background:var(--green-light);color:var(--green)}
.badge-b16{background:var(--amber-light);color:var(--amber)}
.qnum{margin-left:auto;font-size:12px;color:var(--muted)}

.qtext{font-size:15px;font-weight:500;line-height:1.7;color:var(--text);margin-bottom:18px}

/* OPTIONS */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.opts{grid-template-columns:1fr}}
.opt{background:#fafaf9;border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;line-height:1.5;transition:border-color .12s,background .12s;display:flex;gap:10px;align-items:flex-start}
.opt-key{font-weight:600;color:var(--muted);flex-shrink:0;font-size:13px;min-width:18px}
.opt:hover:not(:disabled){background:#f2f1ef;border-color:#bbb}
.opt.correct{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.opt.correct .opt-key{color:var(--green)}
.opt.wrong{background:var(--red-light);border-color:#e57373;color:var(--red)}
.opt.wrong .opt-key{color:var(--red)}
.opt:disabled{cursor:default}

/* EXPLANATION */
.explain{margin-top:14px;font-size:13px;line-height:1.65;padding:12px 16px;background:var(--blue-light);border-left:3px solid var(--blue);border-radius:0 var(--radius) var(--radius) 0;color:#0d3d73}

/* NAV */
.nav{display:flex;gap:8px;align-items:center}
.btn{padding:9px 20px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);cursor:pointer;font-weight:500;transition:all .12s}
.btn:hover{background:#f0efed;border-color:#bbb}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#174f93}
.nav-spacer{flex:1}
.nav-info{font-size:12px;color:var(--muted)}

/* SCORE SCREEN */
.score-screen{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 24px;text-align:center;margin-bottom:14px}
.score-circle{width:100px;height:100px;border-radius:50%;background:var(--blue-light);border:3px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;flex-direction:column}
.score-pct{font-size:26px;font-weight:700;color:var(--blue);line-height:1}
.score-lbl{font-size:10px;color:var(--blue);margin-top:2px}
.score-title{font-size:18px;font-weight:600;margin-bottom:8px}
.score-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.score-row{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.score-card{padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);text-align:center;min-width:80px}
.score-card .n{font-size:22px;font-weight:700}
.score-card .l{font-size:11px;color:var(--muted);margin-top:2px}
.sc-green .n{color:var(--green)}
.sc-red .n{color:var(--red)}
.sc-blue .n{color:var(--blue)}
</style>
</head>
<body>
<h2 class="sr">Flashcard Lịch Sử 12 – Bài 13, 14, 15, 16</h2>
<div class="container">

<div class="header">

      <h1>Ôn tập Lịch Sử 12</h1>
      <p id="subtitle">Chọn bài để bắt đầu ôn tập</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n blue" id="s-total">0</div><div class="stat-l">câu</div></div>

  </div>
</div>

<div id="qcard" class="qcard">

  <div class="nav-spacer"></div>
  <span class="nav-info" id="nav-info"></span>
  <button class="btn primary" id="btn-next" onclick="go(1)" style="display:none">Tiếp →</button>
</div>

</div>

const B13 = [
{l:'#1',q:'Năm 1978, Việt Nam gia nhập tổ chức nào sau đây?',o:['SEV','EU','ASEAN','NATO'],a:0,e:'Năm 1978, Việt Nam gia nhập SEV (Hội đồng Tương trợ Kinh tế xã hội chủ nghĩa).'},
{l:'#1',q:'Tính đến tháng 3-2024, Việt Nam có mối quan hệ "Đối tác chiến lược toàn diện" với bao nhiêu quốc gia?',o:['5','6','7','8'],a:2,e:'Đến tháng 3-2024, Việt Nam có 7 đối tác chiến lược toàn diện.'},

{l:'#1',q:'Một trong các hội nghị quốc tế quan trọng mà Việt Nam đã tổ chức thành công là',o:['APEC','COP28','ICEC','OPEC'],a:0,e:'Việt Nam đã đăng cai tổ chức thành công Hội nghị cấp cao APEC.'},
{l:'#1',q:'Từ năm 1986 đến nay, Việt Nam đã ký các hiệp ước về biên giới trên đất liền với quốc gia nào?',o:['Trung Quốc','Hàn Quốc','Liên Xô','Triều Tiên'],a:0,e:'Việt Nam ký Hiệp ước biên giới trên đất liền với Trung Quốc (1999).'},

{l:'#1',q:'Hội nghị Giơ-ne-vơ (1954) được triệu tập để giải quyết vấn đề nào?',o:['Đông Đức','Đông Dương','Cam-pu-chia','Trung Đông'],a:1,e:'Hội nghị Giơ-ne-vơ 1954 giải quyết vấn đề chấm dứt chiến tranh ở Đông Dương.'},
{l:'#1',q:'Một trong những đối tượng của hoạt động đối ngoại mà VNDCCH tiến hành từ sau CMT8 (1945) là',o:['Pháp','Cuba','Ai Cập','Anh'],a:0,e:'Pháp là đối tượng quan trọng trong ngoại giao của VNDCCH sau 1945.'},

{l:'#1',q:'Nội dung "Hợp tác bình đẳng cùng có lợi..." được Đại hội Đảng lần thứ mấy đề ra?',o:['IV','VI','VII','XI'],a:2,e:'Đại hội Đảng lần VII đề ra đường lối đối ngoại độc lập, tự chủ, đa dạng hóa.'},

{l:'#1',q:'Hiệp định Sơ bộ (6/3/1946), Pháp đã công nhận Việt Nam là quốc gia',o:['Độc lập','Tự do','Dân chủ','Dân quyền'],a:1,e:'Hiệp định Sơ bộ 6/3/1946: Pháp công nhận Việt Nam là "quốc gia tự do".'},

// ── MAIN LOGIC ──────────────────────────────────────────
const ALL_DATA = {B13, B14, B15, B16};
let pool = [], cur = 0, answered = [], correct = 0, wrong = 0, curLesson = 'ALL';

function buildPool(lesson) {
  curLesson = lesson;
  if (lesson === 'ALL') {
    pool = [...B13, ...B14, ...B15, ...B16];
  } else {
    pool = [...ALL_DATA[lesson]];
  }
  cur = 0;
  answered = new Array(pool.length).fill(null);
  correct = 0; wrong = 0;
  updateStats();
  render();
}

function updateStats() {
  document.getElementById('s-total').textContent = pool.length;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
}

function setLesson(lesson) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const map = {B13:'tab-b13', B14:'tab-b14', B15:'tab-b15', B16:'tab-b16', ALL:'tab-all'};
  document.querySelector('.'+map[lesson]).classList.add('active');
  document.getElementById('subtitle').textContent = lesson === 'ALL' ? 'Tất cả bài học' : LESSONS[lesson]?.name || '';
  buildPool(lesson);
}

function render() {
  if (!pool.length) return;
  const q = pool[cur];
  const pct = ((cur+1) / pool.length * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (cur+1) + ' / ' + pool.length;

  // Badges
  const lvlEl = document.getElementById('b-lvl');
  lvlEl.textContent = q.l;
  lvlEl.className = 'badge badge-lvl' + q.l.replace('#','');

  const lessonEl = document.getElementById('b-lesson');
  const lkey = q.lesson || curLesson;
  lessonEl.textContent = lkey === 'B13' ? 'Bài 13' : lkey === 'B14' ? 'Bài 14' : lkey === 'B15' ? 'Bài 15' : 'Bài 16';
  lessonEl.className = 'badge badge-lesson badge-' + lkey.toLowerCase();

  document.getElementById('b-num').textContent = (cur+1) + ' / ' + pool.length;
  document.getElementById('qtext').textContent = q.q;

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  q.o.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    const key = document.createElement('span');
    key.className = 'opt-key';
    key.textContent = ['A','B','C','D'][i];
    const text = document.createElement('span');
    text.textContent = o;
    btn.appendChild(key);
    btn.appendChild(text);

    if (answered[cur] !== null) {
      btn.disabled = true;
      if (i === q.a) btn.classList.add('correct');
      else if (i === answered[cur]) btn.classList.add('wrong');
    } else {
      btn.onclick = () => doAnswer(i);
    }
    optsEl.appendChild(btn);
  });

  const expEl = document.getElementById('explain');
  if (answered[cur] !== null) {
    expEl.style.display = 'block';
    expEl.textContent = '💡 ' + q.e;
  } else {
    expEl.style.display = 'none';
  }

  document.getElementById('btn-prev').style.display = cur > 0 ? '' : 'none';
  document.getElementById('btn-next').style.display = answered[cur] !== null ? '' : 'none';
  document.getElementById('btn-next').textContent = cur === pool.length - 1 ? 'Xem kết quả' : 'Tiếp →';
  document.getElementById('nav-info').textContent = answered[cur] !== null ? (answered[cur] === q.a ? '✓ Đúng!' : '✗ Sai') : '';
}

function doAnswer(i) {
  if (answered[cur] !== null) return;
  answered[cur] = i;
  if (i === pool[cur].a) correct++;
  else wrong++;
  updateStats();
  render();
}

function go(d) {
  if (d > 0 && cur === pool.length - 1) {
    showScore(); return;
  }
  cur = Math.max(0, Math.min(pool.length - 1, cur + d));
  render();
}

function skipQ() {
  if (cur < pool.length - 1) { cur++; render(); }
}

function showScore() {
  const pct = Math.round(correct / pool.length * 100);
  document.getElementById('qcard').innerHTML = `
    <div style="text-align:center;padding:30px 16px">
      <div class="score-circle" style="width:100px;height:100px;border-radius:50%;background:var(--blue-light);border:3px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;flex-direction:column">
        <div style="font-size:26px;font-weight:700;color:var(--blue)">${pct}%</div>
        <div style="font-size:10px;color:var(--blue)">điểm số</div>
      </div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">${pct >= 80 ? '🎉 Xuất sắc!' : pct >= 60 ? '👍 Khá tốt!' : '📚 Cần ôn thêm'}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Bạn đã hoàn thành ${pool.length} câu hỏi</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">
        <div style="padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);text-align:center;min-width:80px"><div style="font-size:22px;font-weight:700;color:var(--green)">${correct}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Đúng</div></div>
        <div style="padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);text-align:center;min-width:80px"><div style="font-size:22px;font-weight:700;color:var(--red)">${wrong}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Sai</div></div>
        <div style="padding:12px 20px;border-radius:var(--radius);border:1px solid var(--border);text-align:center;min-width:80px"><div style="font-size:22px;font-weight:700;color:var(--blue)">${pool.length - correct - wrong}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Bỏ qua</div></div>
      </div>
      <button class="btn primary" onclick="setLesson(curLesson)" style="margin-right:8px">Làm lại</button>
      <button class="btn" onclick="setLesson('ALL')">Tất cả bài</button>
    </div>`;
  document.getElementById('nav').style.display = 'none';
}

// Start
setLesson('ALL');
</script>
</body>
</html>
